<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapeo de Artículos en Tienda (Testing + Excel)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                        comp: { 50: '#f8fafc', 100: '#f1f5f9', 500: '#64748b', 600: '#475569', 700: '#334155' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SheetJS (Para Exportar a Excel real .xlsx) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Importmap para Firebase -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
      }
    </script>

    <style>
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, updateDoc } from 'firebase/firestore';

        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAZzGCXeUtj4pM3IMYB5RR0XKj3wh6lctI",
            authDomain: "plankhn.firebaseapp.com",
            projectId: "plankhn",
            storageBucket: "plankhn.firebasestorage.app",
            messagingSenderId: "500734544493",
            appId: "1:500734544493:web:855c2e097a45ac33afcd64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ICONOS SVG ---
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>;
        const IconSave = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const IconStore = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-brand-600"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconTag = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>;
        const IconBack = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconExcel = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="16" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-600"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;

        // --- COMPONENTE PRINCIPAL APP ---
        function App() {
            // Estado de Visita, Artículos e Historial
            const [currentVisit, setCurrentVisit] = useState(null);
            const [articles, setArticles] = useState([]);
            
            const [allHistoricalArticles, setAllHistoricalArticles] = useState([]);
            const [allHistoricalVisits, setAllHistoricalVisits] = useState([]);
            
            // Estado para el Modal de Resumen
            const [showSummary, setShowSummary] = useState(false);
            
            // Listas predictivas (Autocompletado)
            const [marcasSugeridas, setMarcasSugeridas] = useState([]);
            const [productosSugeridos, setProductosSugeridos] = useState([]);

            // Configuración persistente: Mi Marca y Productos Rápidos
            const [miMarcaConfig, setMiMarcaConfig] = useState(() => localStorage.getItem('miMarcaConfig') || '');
            const [productosRapidos, setProductosRapidos] = useState(() => {
                try { return JSON.parse(localStorage.getItem('productosRapidos')) || []; } catch { return []; }
            });
            const [marcasRapidas, setMarcasRapidas] = useState(() => {
                try { return JSON.parse(localStorage.getItem('marcasRapidas')) || []; } catch { return []; }
            });
            const [showConfig, setShowConfig] = useState(false);

            // --- MODO VERIFICACIÓN RÁPIDA (lista enviada por el jefe) ---
            const [checkMode, setCheckMode] = useState(false);
            const [checkTienda, setCheckTienda] = useState('');
            const [checkPaste, setCheckPaste] = useState('');
            const [checkItems, setCheckItems] = useState([]);

            useEffect(() => { localStorage.setItem('miMarcaConfig', miMarcaConfig); }, [miMarcaConfig]);
            useEffect(() => { localStorage.setItem('productosRapidos', JSON.stringify(productosRapidos)); }, [productosRapidos]);
            useEffect(() => { localStorage.setItem('marcasRapidas', JSON.stringify(marcasRapidas)); }, [marcasRapidas]);

            // Estado del Formulario
            const [tiendaInput, setTiendaInput] = useState('');
            const [formData, setFormData] = useState({
                esMiMarca: true,
                marca: localStorage.getItem('miMarcaConfig') || '',
                producto: '',
                modelo: '',
                tamano: '',
                unidad: 'pulg',
                precio: '',
                precioOferta: ''
            });

            const [toasts, setToasts] = useState([]);

            // Cargar Artículos Globales (Firebase)
            useEffect(() => {
                const artsRef = collection(db, "articulos");
                const unsubscribe = onSnapshot(artsRef, (snapshot) => {
                    const allArts = [];
                    const marcas = new Set();
                    const prods = new Set();
                    
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        allArts.push({ id: doc.id, ...data });
                        if (data.marca) marcas.add(data.marca);
                        if (data.producto) prods.add(data.producto);
                    });
                    
                    setAllHistoricalArticles(allArts);
                    setMarcasSugeridas([...marcas].sort());
                    setProductosSugeridos([...prods].sort());

                    if (currentVisit) {
                        const currentVisitArts = allArts.filter(a => a.visitaId === currentVisit.id);
                        currentVisitArts.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                        setArticles(currentVisitArts);
                    }
                });
                return () => unsubscribe();
            }, [currentVisit]);

            // Cargar Historial de Visitas Globales (Firebase)
            useEffect(() => {
                const visitsRef = collection(db, "visitas");
                const unsubscribe = onSnapshot(visitsRef, (snapshot) => {
                    const visits = [];
                    snapshot.forEach((doc) => {
                        visits.push({ id: doc.id, ...doc.data() });
                    });
                    // Ordenar más recientes primero
                    visits.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                    setAllHistoricalVisits(visits);
                });
                return () => unsubscribe();
            }, []);

            // Exportación a Excel (Reportes)
            const exportToExcel = (visitaId = null) => {
                let dataToExport = allHistoricalArticles;
                let fileName = "Reporte_General_Mapeo.xlsx";

                if (visitaId) {
                    dataToExport = allHistoricalArticles.filter(a => a.visitaId === visitaId);
                    const visitData = allHistoricalVisits.find(v => v.id === visitaId);
                    fileName = `Reporte_${visitData ? visitData.tienda.replace(/\s+/g, '_') : 'Visita'}.xlsx`;
                }

                if (dataToExport.length === 0) {
                    addToast('No hay artículos registrados para exportar.', 'error');
                    return;
                }

                // Calcula la diferencia entre precio oferta y regular (con signo + o -)
                const calcularDiferencia = (item) => {
                    const reg = parseFloat(item.precio);
                    const ofe = parseFloat(item.precioOferta);
                    if (isNaN(reg) || isNaN(ofe)) return '-';
                    const dif = ofe - reg;
                    if (dif === 0) return '0.00';
                    return `${dif > 0 ? '+' : '-'}${Math.abs(dif).toFixed(2)}`;
                };

                // Transformar datos para que Excel se vea limpio
                const excelData = dataToExport.map(item => ({
                    'Fecha de Captura': item.fecha || '-',
                    'Punto de Venta': item.tienda || '-',
                    'Marca': item.marca || '-',
                    'Producto': item.producto || '-',
                    'Modelo': item.modelo || '-',
                    'Tamaño': item.tamano ? `${item.tamano}${item.unidad && item.unidad !== 'N/A' ? ' ' + item.unidad : ''}` : '-',
                    'Precio Regular (HNL)': item.precio || '-',
                    'Precio Oferta (HNL)': item.precioOferta || '-',
                    'Diferencia (HNL)': calcularDiferencia(item)
                }));

                try {
                    const worksheet = XLSX.utils.json_to_sheet(excelData);
                    const workbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(workbook, worksheet, "Inventario Mapeado");
                    XLSX.writeFile(workbook, fileName);
                    addToast(`Archivo ${fileName} descargado con éxito.`, 'success');
                } catch (error) {
                    console.error(error);
                    addToast('Ocurrió un error al generar el archivo de Excel.', 'error');
                }
            };

            // Sistema de Notificaciones
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            // Crear una nueva Visita
            const handleCreateVisit = async (e) => {
                e.preventDefault();
                if (!tiendaInput.trim()) {
                    addToast('Ingresa el nombre de la tienda', 'error');
                    return;
                }
                try {
                    const visitRef = await addDoc(collection(db, "visitas"), {
                        tienda: tiendaInput.trim().toUpperCase(),
                        fecha: new Date().toLocaleDateString('es-ES'),
                        estado: 'en_progreso',
                        timestamp: serverTimestamp(),
                        testMode: true
                    });
                    setCurrentVisit({ id: visitRef.id, tienda: tiendaInput.trim().toUpperCase() });
                    setTiendaInput('');
                    addToast('Visita iniciada. Ya puedes registrar.', 'success');
                } catch (error) {
                    console.error(error);
                    addToast('Error al crear visita', 'error');
                }
            };

            // Inputs del Formulario de Artículo (texto siempre en MAYÚSCULAS)
            const CAMPOS_TEXTO = ['marca', 'producto', 'modelo'];
            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                const finalValue = type === 'checkbox' ? checked : (CAMPOS_TEXTO.includes(name) ? value.toUpperCase() : value);
                setFormData(prev => {
                    const next = { ...prev, [name]: finalValue };
                    // Autorrellenar / limpiar la marca según el toggle Mi Marca
                    if (name === 'esMiMarca') {
                        if (checked && miMarcaConfig) {
                            next.marca = miMarcaConfig.toUpperCase();
                        } else if (!checked && prev.marca === miMarcaConfig.toUpperCase()) {
                            next.marca = '';
                        }
                    }
                    return next;
                });
            };

            // Seleccionar un producto rápido
            const handleSelectProducto = (nombre) => {
                setFormData(prev => ({ ...prev, producto: nombre }));
            };

            // Guardar el producto escrito como producto rápido
            const handleAddProductoRapido = () => {
                const nombre = formData.producto.trim().toUpperCase();
                if (!nombre) {
                    addToast('Escribe el nombre del producto primero.', 'error');
                    return;
                }
                if (productosRapidos.some(p => p.toUpperCase() === nombre)) {
                    addToast('Ese producto ya está en tu lista.', 'info');
                    return;
                }
                setProductosRapidos(prev => [...prev, nombre].sort());
                addToast(`"${nombre}" agregado a productos rápidos.`, 'success');
            };

            // Eliminar un producto rápido
            const handleRemoveProductoRapido = (nombre) => {
                setProductosRapidos(prev => prev.filter(p => p !== nombre));
            };

            // Seleccionar una marca rápida
            const handleSelectMarca = (nombre) => {
                setFormData(prev => ({ ...prev, marca: nombre }));
            };

            // Guardar la marca escrita como marca rápida
            const handleAddMarcaRapida = () => {
                const nombre = formData.marca.trim().toUpperCase();
                if (!nombre) {
                    addToast('Escribe el nombre de la marca primero.', 'error');
                    return;
                }
                if (marcasRapidas.some(m => m.toUpperCase() === nombre)) {
                    addToast('Esa marca ya está en tu lista.', 'info');
                    return;
                }
                setMarcasRapidas(prev => [...prev, nombre].sort());
                addToast(`"${nombre}" agregada a marcas rápidas.`, 'success');
            };

            // Eliminar una marca rápida
            const handleRemoveMarcaRapida = (nombre) => {
                setMarcasRapidas(prev => prev.filter(m => m !== nombre));
            };

            // Guardar Artículo
            const handleSaveArticle = async (e) => {
                e.preventDefault();
                if (!formData.marca.trim() || !formData.producto.trim() || !formData.modelo.trim()) {
                    addToast('Marca, Producto y Modelo son obligatorios.', 'error');
                    return;
                }
                try {
                    await addDoc(collection(db, "articulos"), {
                        visitaId: currentVisit.id,
                        tienda: currentVisit.tienda,
                        fecha: new Date().toLocaleDateString('es-ES'),
                        ...formData,
                        marca: formData.marca.trim().toUpperCase(),
                        producto: formData.producto.trim().toUpperCase(),
                        modelo: formData.modelo.trim().toUpperCase(),
                        timestamp: serverTimestamp(),
                        testMode: true
                    });
                    setFormData(prev => ({
                        ...prev,
                        marca: (prev.esMiMarca && miMarcaConfig) ? miMarcaConfig.toUpperCase() : '',
                        producto: '', modelo: '', tamano: '', precio: '', precioOferta: ''
                    }));
                    addToast('Artículo guardado con éxito.', 'success');
                } catch (error) {
                    console.error(error);
                    addToast('Error al guardar en Firebase.', 'error');
                }
            };

            const handleDelete = async (id) => {
                if (window.confirm('¿Eliminar este registro?')) {
                    try {
                        await deleteDoc(doc(db, "articulos", id));
                        addToast('Registro eliminado.', 'info');
                    } catch (error) { addToast('Error al eliminar.', 'error'); }
                }
            };

            // Confirmar y Guardar Visita Final (Modal)
            const handleConfirmFinish = async () => {
                try {
                    await updateDoc(doc(db, "visitas", currentVisit.id), {
                        estado: 'completada',
                        totalArticulos: articles.length
                    });
                    setShowSummary(false);
                    setCurrentVisit(null);
                    addToast('Visita guardada y finalizada correctamente.', 'success');
                } catch (error) {
                    console.error(error);
                    addToast('Error al guardar la visita final.', 'error');
                }
            };

            // Eliminar Visita completa del historial
            const handleDeleteVisit = async (id) => {
                if (window.confirm('¿Estás seguro de eliminar todo el registro de esta visita?')) {
                    try {
                        await deleteDoc(doc(db, "visitas", id));
                        addToast('Visita eliminada del historial.', 'info');
                    } catch (error) { addToast('Error al eliminar visita.', 'error'); }
                }
            };

            // Reabrir una visita del historial para editarla (agregar o eliminar artículos)
            const handleReopenVisit = async (visit) => {
                try {
                    await updateDoc(doc(db, "visitas", visit.id), { estado: 'en_progreso' });
                    setCurrentVisit({ id: visit.id, tienda: visit.tienda });
                    addToast(`Visita a ${visit.tienda} reabierta. Puedes seguir editando.`, 'success');
                } catch (error) {
                    console.error(error);
                    addToast('Error al reabrir la visita.', 'error');
                }
            };

            // ===== MODO VERIFICACIÓN RÁPIDA =====

            // Extrae modelo, P/N y P/O de un mensaje pegado (formato del jefe)
            const parseListaMensaje = (texto) => {
                const num = (s) => {
                    if (!s) return '';
                    const limpio = String(s).replace(/[^\d.,]/g, '').replace(/,/g, '');
                    const n = parseFloat(limpio);
                    return isNaN(n) ? '' : String(n);
                };

                const items = [];
                let pendiente = null; // modelo esperando sus precios

                texto.split(/\r?\n/).forEach(raw => {
                    const linea = raw.trim();
                    if (!linea) return;

                    // ¿Trae precios? (P/N y/o P/O, con o sin espacios/dos puntos)
                    const mPN = linea.match(/P\s*\/?\s*N\s*:?\s*([\d.,]+)/i);
                    const mPO = linea.match(/P\s*\/?\s*O\s*:?\s*([\d.,]+)/i);

                    if (mPN || mPO) {
                        // Puede venir el modelo en la misma línea, antes de los precios
                        const antes = linea.split(/P\s*\/?\s*[NO]/i)[0].trim().replace(/[-–—:]+$/, '').trim();
                        const modelo = (pendiente || antes || '').toUpperCase();
                        if (modelo) {
                            items.push({
                                id: `${modelo}-${items.length}`,
                                modelo,
                                pn: mPN ? num(mPN[1]) : '',
                                po: mPO ? num(mPO[1]) : '',
                                estado: null,      // null | 'no_esta' | 'esta'
                                cambioPrecio: null, // null | 'igual' | 'cambio'
                                poNuevo: ''
                            });
                        }
                        pendiente = null;
                        return;
                    }

                    // Línea sin precios: descartar saludos/encabezados, lo demás es un modelo
                    const esEncabezado = /buen[oa]s?\s|compañer|inventario|pdv|saludos|gracias|favor/i.test(linea);
                    if (!esEncabezado && linea.length <= 40) {
                        pendiente = linea.replace(/[.:•\-–—]+$/, '').trim();
                    }
                });

                return items;
            };

            const handleParseLista = () => {
                const items = parseListaMensaje(checkPaste);
                if (items.length === 0) {
                    addToast('No se detectaron modelos en el mensaje. Revisa el formato.', 'error');
                    return;
                }
                setCheckItems(items);
                addToast(`${items.length} modelos extraídos.`, 'success');
            };

            const updateCheckItem = (id, cambios) => {
                setCheckItems(prev => prev.map(it => it.id === id ? { ...it, ...cambios } : it));
            };

            const handleResetCheck = () => {
                if (checkItems.length && !window.confirm('¿Descartar la lista actual y empezar de nuevo?')) return;
                setCheckItems([]);
                setCheckPaste('');
            };

            // Diferencia del precio oferta con signo (+ subió / - bajó)
            const difOferta = (item) => {
                const ant = parseFloat(item.po);
                const nue = parseFloat(item.poNuevo);
                if (isNaN(ant) || isNaN(nue)) return null;
                return nue - ant;
            };

            // Precio oferta final que aplica a un artículo verificado
            const poFinal = (item) => {
                if (item.cambioPrecio === 'cambio' && item.poNuevo) return item.poNuevo;
                return item.po;
            };

            // Excel del modo verificación
            const exportCheckToExcel = () => {
                const verificados = checkItems.filter(i => i.estado);
                if (verificados.length === 0) {
                    addToast('Marca al menos un artículo antes de exportar.', 'error');
                    return;
                }

                const fmt = (v) => {
                    const n = parseFloat(v);
                    if (isNaN(n)) return '';
                    return Number.isInteger(n) ? String(n) : n.toFixed(2);
                };

                const excelData = checkItems.map(item => {
                    const enTienda = item.estado === 'esta';
                    const d = enTienda ? difOferta(item) : null;
                    return {
                        'Fecha': new Date().toLocaleDateString('es-ES'),
                        'Punto de Venta': checkTienda || '-',
                        'Marca': enTienda ? (miMarcaConfig.toUpperCase() || '') : '',
                        'Modelo': item.modelo,
                        'Precio Regular (P/N)': enTienda ? fmt(item.pn) : '',
                        'Precio Oferta Anterior': enTienda ? fmt(item.po) : '',
                        'Precio Oferta Nuevo': (enTienda && item.cambioPrecio === 'cambio') ? fmt(item.poNuevo) : '',
                        'Diferencia': (d !== null && item.cambioPrecio === 'cambio')
                            ? `${d > 0 ? '+' : d < 0 ? '-' : ''}${Math.abs(d).toFixed(2)}`
                            : '',
                        'Estado': item.estado === 'no_esta' ? 'NO ESTÁ EN TIENDA'
                            : item.cambioPrecio === 'cambio' ? 'PRECIO CAMBIÓ'
                            : item.cambioPrecio === 'igual' ? 'SIN CAMBIO'
                            : 'EN TIENDA'
                    };
                });

                const ws = XLSX.utils.json_to_sheet(excelData);
                ws['!cols'] = [{ wch: 12 }, { wch: 24 }, { wch: 14 }, { wch: 16 }, { wch: 18 }, { wch: 20 }, { wch: 18 }, { wch: 12 }, { wch: 20 }];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Verificación");
                const nombre = `Verificacion_${(checkTienda || 'TIENDA').replace(/[^\w]/g, '_')}_${new Date().toISOString().slice(0, 10)}.xlsx`;
                XLSX.writeFile(wb, nombre);
                addToast('Reporte de verificación generado.', 'success');
            };

            // Mensaje de WhatsApp del modo verificación
            const shareCheckWhatsApp = () => {
                const enTienda = checkItems.filter(i => i.estado === 'esta');
                if (enTienda.length === 0) {
                    addToast('No hay artículos marcados como disponibles en tienda.', 'error');
                    return;
                }

                const fmt = (v) => {
                    const n = parseFloat(v);
                    if (isNaN(n)) return String(v);
                    return Number.isInteger(n) ? String(n) : n.toFixed(2);
                };

                const hora = new Date().getHours();
                const saludo = hora < 12 ? 'Buenos días' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';

                const lineas = enTienda.map(item => {
                    const precios = [];
                    if (item.pn) precios.push(`P/N: ${fmt(item.pn)}`);

                    const po = poFinal(item);
                    if (item.po) {
                        if (item.cambioPrecio === 'cambio' && item.poNuevo) {
                            const d = difOferta(item);
                            const signo = d === null || d === 0 ? '' : (d > 0 ? '+' : '-');
                            const monto = d === null ? '' : ` ${signo}${fmt(Math.abs(d))}`;
                            precios.push(`P/O: ${fmt(item.po)} (${fmt(item.poNuevo)})${monto}`);
                        } else {
                            precios.push(`P/O: ${fmt(item.po)}`);
                        }
                    } else if (item.cambioPrecio === 'cambio' && item.poNuevo) {
                        // No traía P/O anterior pero ahora sí tiene oferta
                        precios.push(`P/O: (${fmt(item.poNuevo)})`);
                    }
                    return precios.length ? `${item.modelo}\n${precios.join(' ')}` : item.modelo;
                });

                const noEstan = checkItems.filter(i => i.estado === 'no_esta');
                let mensaje = `${saludo} compañeros.\nInventario en PDV ${checkTienda || ''}.\n\n${lineas.join('\n\n')}`;
                if (noEstan.length > 0) {
                    mensaje += `\n\nNo disponibles en tienda:\n${noEstan.map(i => i.modelo).join('\n')}`;
                }

                if (navigator.clipboard) navigator.clipboard.writeText(mensaje).catch(() => {});
                window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
                addToast('Mensaje copiado. Abriendo WhatsApp...', 'success');
            };

            // Generar mensaje de inventario para compartir por WhatsApp
            const handleShareWhatsApp = (visitaId, tienda) => {
                const arts = allHistoricalArticles
                    .filter(a => a.visitaId === visitaId && a.esMiMarca)
                    .sort((a, b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));

                if (arts.length === 0) {
                    addToast('No hay artículos de tu marca en esta visita.', 'error');
                    return;
                }

                const hora = new Date().getHours();
                const saludo = hora < 12 ? 'Buenos días' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';

                const fmtPrecio = (v) => {
                    const n = parseFloat(v);
                    if (isNaN(n)) return v;
                    return Number.isInteger(n) ? String(n) : n.toFixed(2);
                };

                const lineas = arts.map(a => {
                    const titulo = a.modelo || a.producto || '-';
                    const precios = [];
                    if (a.precio) precios.push(`P/N: ${fmtPrecio(a.precio)}`);
                    if (a.precioOferta) precios.push(`P/O: ${fmtPrecio(a.precioOferta)}`);
                    return precios.length ? `${titulo}\n${precios.join(' ')}` : titulo;

                const mensaje = `${saludo} compañeros.\nInventario en PDV ${tienda}.\n\n${lineas.join('\n\n')}`;

                if (navigator.clipboard) {
                    navigator.clipboard.writeText(mensaje).catch(() => {});
                }
                window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
                addToast('Mensaje copiado. Abriendo WhatsApp...', 'success');

                                            </button>
                                        </div>
                                    )}
                                </div>

                                <div className="p-4 sm:p-6 space-y-3 overflow-y-auto flex-1">
                                    {checkItems.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-center py-16 text-slate-400">

                                            <p className="text-sm">Pega el mensaje y toca "Extraer lista"</p>

                                                    {item.cambioPrecio === 'igual' && <span className="text-xs font-semibold text-emerald-700 bg-emerald-100 px-2 py-1 rounded-lg shrink-0">SIN CAMBIO</span>}
                                                    {item.cambioPrecio === 'cambio' && item.poNuevo && (

                    {/* --- PANTALLA 1: DASHBOARD INICIAL (NUEVA VISITA + HISTORIAL) --- */}

                                </div>
                                <div className="flex-1 overflow-auto p-6">
                                    <table className="w-full text-left border-collapse min-w-[600px]">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-200">
                                                <th className="py-3 px-4 text-xs font-bold text-slate-500 uppercase">Marca</th>
                                                <th className="py-3 px-4 text-xs font-bold text-slate-500 uppercase">Producto / Modelo</th>
                                                <th className="py-3 px-4 text-xs font-bold text-slate-500 uppercase">Precio Reg.</th>
                                                <th className="py-3 px-4 text-xs font-bold text-slate-500 uppercase">Oferta</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {articles.map((row) => (
                                                <tr key={`sum-${row.id}`} className="hover:bg-slate-50">
                                                    <td className="py-3 px-4">
                                                        <span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider mb-1 ${row.esMiMarca ? 'bg-brand-100 text-brand-700' : 'bg-slate-200 text-slate-600'}`}>
                                                            {row.esMiMarca ? 'Mi Marca' : 'Comp.'}
                                                        </span>
                                                        <p className="font-bold text-slate-800 text-sm">{row.marca}</p>
                                                    </td>
                                                    <td className="py-3 px-4">
                                                        <p className="font-medium text-slate-800 text-sm">{row.producto}</p>
                                                        <p className="text-xs text-slate-500">Mod: {row.modelo}</p>
                                                    </td>
                                                    <td className="py-3 px-4 text-sm font-medium text-slate-700">{formatPrice(row.precio)}</td>
                                                    <td className="py-3 px-4 text-sm font-bold text-emerald-600">{row.precioOferta ? formatPrice(row.precioOferta) : '-'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-6 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                                    <button onClick={() => setShowSummary(false)} className="px-5 py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-200 transition-colors">
                                        Volver a editar
                                    </button>
                                    <button onClick={handleConfirmFinish} className="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-6 rounded-xl shadow-lg shadow-emerald-600/30 transition-all flex items-center gap-2">
                                        <IconSave /> Guardar y Salir
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TOASTS (Notificaciones) */}
                    <div className="fixed bottom-4 right-4 sm:bottom-8 sm:right-8 z-50 flex flex-col gap-3">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`flex items-center gap-3 px-5 py-4 rounded-2xl shadow-xl shadow-slate-200/50 border bg-white animate-[slideIn_0.3s_ease-out]
                                ${toast.type === 'success' ? 'border-emerald-100' : toast.type === 'error' ? 'border-red-100' : 'border-blue-100'}`}>
                                <div className={`shrink-0 p-1 rounded-full ${toast.type === 'success' ? 'bg-emerald-50' : toast.type === 'error' ? 'bg-red-50' : 'bg-blue-50'}`}>
                                    {toast.type === 'success' && <IconCheck />}
                                    {toast.type === 'error' && <IconAlert />}
                                </div>
                                <p className="text-sm font-medium text-slate-700">{toast.message}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</body>
</html>
